<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tree Risk 🌳</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Seu CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>Tree Risk</h2>
  <div class="links">
    <span>Home</span>
    <span>Mapa</span>
  </div>
</div>

<!-- CONTAINER -->
<div class="container">

  <h1>Cadastro de Árvores 🌳</h1>

  <div class="card">
    <input type="text" id="species" placeholder="Espécie da árvore">
    <input type="number" id="height" placeholder="Altura (m)">
    <button onclick="enableMapClick()">Cadastrar clicando no mapa</button>
  </div>

  <div class="map-wrapper">
    <div id="map"></div>
    <button class="expand-btn" onclick="toggleMap()">⛶ Expandir</button>
  </div>

  <p id="status"></p>

  <!-- LISTA -->
  <div id="tree-list"></div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Script -->
<script src="src/script.js "></script>

</body>
</html>
